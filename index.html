<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mrzd·Org</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="https://Mrzd.Org/Game"
        data-bg-color=""
        data-speed-ratio=""
        data-randomness-ratio=""
        data-bound-top=""
        data-bound-bottom=""
        data-thickness-min-ratio=""
        data-thickness-max-ratio=""
        data-color-top=""
        data-color-center=""
        data-color-bottom=""
        data-logo-svg=""
    ></canvas>
    <!--
    ═══════════════════════════════════════════════════════════════
    НАСТРОЙКА АНИМАЦИИ
    ═══════════════════════════════════════════════════════════════

    Все параметры задаются через data-атрибуты тега <canvas> выше.
    Пустой атрибут = используется дефолтное значение из кода.
    id canvas менять нельзя — любое другое значение отключит скрипт.

    ───────────────────────────────────────────────────────────────
    ФОН
    ───────────────────────────────────────────────────────────────
    data-bg-color           Цвет фона. Любая CSS-строка: "#000", "rgb(10,10,10)".
                            Дефолт: "#000"

    ───────────────────────────────────────────────────────────────
    ДВИЖЕНИЕ
    ───────────────────────────────────────────────────────────────
    data-speed-ratio        Скорость прокрутки. 1 = весь экран за 1 сек. Дефолт: 1

    data-randomness-ratio   Хаотичность движения.
                            0 = прямая линия. 2.0 = очень хаотично. Дефолт: 1.0

    data-bound-top          Верхняя граница движения. Доля высоты экрана (0.0–1.0).
                            Дефолт: 0.1666 (≈ 1/6 от верха)

    data-bound-bottom       Нижняя граница движения. Доля высоты экрана (0.0–1.0).
                            Должна быть больше bound-top. Дефолт: 0.8333 (≈ 5/6 от верха)

    ───────────────────────────────────────────────────────────────
    ТОЛЩИНА
    ───────────────────────────────────────────────────────────────
    Толщина меняется между min и max: в центре — min, у границы — max.

    data-thickness-min-ratio   Минимальная толщина. Доля высоты экрана. Дефолт: 0.001
    data-thickness-max-ratio   Максимальная толщина. Доля высоты экрана. Дефолт: 0.1

    ───────────────────────────────────────────────────────────────
    ЦВЕТ
    ───────────────────────────────────────────────────────────────
    Цвет интерполируется между тремя точками по вертикали.
    Формат: [R,G,B] где каждый канал от 0 до 255.

    data-color-top      Цвет у верхней границы.  Дефолт: [0,255,0]
    data-color-center   Цвет в центре экрана.     Дефолт: [0,0,255]
    data-color-bottom   Цвет у нижней границы.    Дефолт: [255,0,0]

    ───────────────────────────────────────────────────────────────
    ЛОГОТИП
    ───────────────────────────────────────────────────────────────
    Логотип рисуется на голове линии и перекрашивается в её цвет.
    SVG должен быть чёрным на прозрачном фоне.

    data-logo-svg   Путь к внешнему SVG-файлу.
                    "" = использовать встроенный логотип (дефолт).

    ═══════════════════════════════════════════════════════════════
    -->
    <script data-target="https://Mrzd.Org/Game" src="00_init.js"></script>

</body>
</html>
